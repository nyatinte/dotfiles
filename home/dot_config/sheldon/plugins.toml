# Sheldon Plugin Configuration
# https://sheldon.cli.rs/

shell = "zsh"

# ref: <https://sheldon.cli.rs/Examples.html?highlight=defer#deferred-loading-of-plugins-in-zsh>
[plugins.zsh-defer]
github = "romkatv/zsh-defer"

[templates]
defer = "{{ hooks?.pre | nl }}{% for file in files %}zsh-defer source \"{{ file }}\"\n{% endfor %}{{ hooks?.post | nl }}"


# =============================
# Plugins
# =============================

# <https://github.com/olets/zsh-abbr>
[plugins.zsh-abbr]
github = "olets/zsh-abbr"
apply = ["defer"]

[plugins.zsh-abbr.hooks]
pre = '''
export ABBR_USER_ABBREVIATIONS_FILE="${HOME}/.zsh.d/abbreviations"
export ABBR_AUTOLOAD=0
'''

# <https://github.com/olets/zsh-window-title>
[plugins.zsh-window-title]
github = "olets/zsh-window-title"
apply = ["defer"]

# <https://github.com/Aloxaf/fzf-tab>
[plugins.fzf-tab]
github = "Aloxaf/fzf-tab"
apply = ["defer"]

# <https://github.com/zsh-users/zsh-autosuggestions>
[plugins.zsh-autosuggestions]
github = "zsh-users/zsh-autosuggestions"
use = ["{{ name }}.zsh"]
apply = ["defer"]

# <https://github.com/zdharma-continuum/fast-syntax-highlighting>
[plugins.fast-syntax-highlighting]
github = "zdharma-continuum/fast-syntax-highlighting"
apply = ["defer"]

# <https://github.com/5A6F65/fast-abbr-highlighting>
[plugins.fast-abbr-highlighting]
github = "5A6F65/fast-abbr-highlighting"
apply = ["defer"]

# <https://github.com/zsh-users/zsh-completions>
[plugins.zsh-completions]
github = "zsh-users/zsh-completions"
apply = ["defer"]

# <https://github.com/zpm-zsh/ls>
[plugins.zpm-zsh-ls]
github = "zpm-zsh/ls"
apply = ["defer"]

# <https://github.com/ajeetdsouza/zoxide>
[plugins.zoxide]
inline = 'eval "$(zoxide init zsh --cmd cd)"'

# <https://github.com/sindresorhus/pure>
[plugins.pure]
github = "sindresorhus/pure"
use = ["async.zsh", "pure.zsh"]

[plugins.pure.hooks]
pre = '''
PURE_PROMPT_SYMBOL="🐧 ❯"
# Green palette (from Starship theme)
# Forest Depth
zstyle ':prompt:pure:path'           color '#7fad96'
zstyle ':prompt:pure:git:branch'     color '#5bc4d4'
zstyle ':prompt:pure:git:dirty'      color '#e5c07b'
zstyle ':prompt:pure:git:arrow'      color '#a8d1a0'
zstyle ':prompt:pure:git:stash'      color '#c678dd'
zstyle ':prompt:pure:git:action'     color '#e06c75'
zstyle ':prompt:pure:execution_time' color '#5c6370'
zstyle ':prompt:pure:prompt:success' color '#98c379'
zstyle ':prompt:pure:prompt:error'   color '#e06c75'
'''

[plugins.compinit]
inline = '''
autoload -Uz compinit
# once a day
for dump in ~/.zcompdump(N.mh+24); do
    compinit; return
done
compinit -C
'''

# <https://carapace.sh>
[plugins.carapace]
inline = '''
export CARAPACE_BRIDGES='zsh,fish,bash,inshellisense'
zstyle ':completion:*' format $'\e[2;37mCompleting %d\e[m'
source <(carapace _carapace)
'''

# ==============================
# Plugin Hooks
# ==============================

[plugins.zpm-zsh-ls.hooks]
pre = '''
export ZSH_LS_BACKEND="eza"
export ZSH_LS_DISABLE_GIT=false
'''
